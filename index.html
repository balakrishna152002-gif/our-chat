<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ponnu & Shundruu 💬</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e8e8e3;
      --text-primary: #1a1a1a;
      --text-secondary: #888880;
      --accent-ponnu: #2563eb;
      --accent-shundruu: #db2777;
      --bubble-ponnu: #2563eb;
      --bubble-shundruu: #f3f3ee;
      --bubble-ponnu-text: #ffffff;
      --bubble-shundruu-text: #1a1a1a;
      --input-bg: #ffffff;
      --header-bg: #ffffff;
      --online: #22c55e;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0;
      transition: background 0.3s ease;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      width: 100%;
      max-width: 360px;
      padding: 20px;
      animation: fadeUp 0.4s ease;
    }

    .login-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    .login-card .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-card .brand .hearts {
      font-size: 32px;
      display: block;
      margin-bottom: 10px;
    }

    .login-card .brand h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .login-card .brand p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .user-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .user-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.18s ease;
      font-family: 'DM Sans', sans-serif;
      text-align: left;
    }

    .user-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .user-btn.ponnu { border-color: var(--accent-ponnu); }
    .user-btn.ponnu:hover { background: #eff6ff; }
    .user-btn.shundruu { border-color: var(--accent-shundruu); }
    .user-btn.shundruu:hover { background: #fdf2f8; }

    .user-btn .avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-btn.ponnu .avatar { background: #dbeafe; color: var(--accent-ponnu); }
    .user-btn.shundruu .avatar { background: #fce7f3; color: var(--accent-shundruu); }

    .user-btn .info .name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .user-btn .info .sub {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 100vh;
      flex-direction: column;
      background: var(--surface);
      box-shadow: var(--shadow-md);
    }

    @media (min-height: 700px) {
      #chat-screen {
        height: 92vh;
        max-height: 820px;
        border-radius: 20px;
        overflow: hidden;
      }
      body { padding: 20px; }
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .header-avatars { position: relative; width: 44px; height: 36px; }

    .ha-1, .ha-2 {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; position: absolute;
      border: 2px solid var(--surface);
    }

    .ha-1 { background: #dbeafe; color: var(--accent-ponnu); top: 0; left: 0; z-index: 2; }
    .ha-2 { background: #fce7f3; color: var(--accent-shundruu); bottom: 0; right: 0; z-index: 1; }

    .header-info .title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

    .header-info .status {
      font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 5px;
    }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--online); animation: pulse 2s infinite; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .you-badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
    .you-badge.ponnu { background: #dbeafe; color: var(--accent-ponnu); }
    .you-badge.shundruu { background: #fce7f3; color: var(--accent-shundruu); }

    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-size: 12px; color: var(--text-secondary); cursor: pointer;
    }

    #messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
    }

    .date-divider { text-align: center; font-size: 11px; color: var(--text-secondary); font-family: 'DM Mono', monospace; margin: 12px 0 8px; }

    .msg-row { display: flex; flex-direction: column; max-width: 72%; animation: msgIn 0.2s ease; }
    .msg-row.mine { align-self: flex-end; align-items: flex-end; }
    .msg-row.theirs { align-self: flex-start; align-items: flex-start; }

    .msg-sender { font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 3px; padding: 0 4px; }

    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.5; word-break: break-word; }

    .msg-row.mine .msg-bubble { background: var(--bubble-ponnu); color: var(--bubble-ponnu-text); border-bottom-right-radius: 4px; }
    .msg-row.theirs .msg-bubble { background: var(--bubble-shundruu); color: var(--bubble-shundruu-text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    body.is-shundruu .msg-row.mine .msg-bubble { background: var(--accent-shundruu); color: #fff; }

    .msg-time { font-size: 10px; color: var(--text-secondary); margin-top: 3px; padding: 0 4px; font-family: 'DM Mono', monospace; }

    #typing-indicator { padding: 6px 16px; font-size: 12px; color: var(--text-secondary); min-height: 24px; font-style: italic; }

    .chat-input-area { padding: 12px 16px 16px; background: var(--surface); border-top: 1px solid var(--border); }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    #msg-input {
      flex: 1; padding: 11px 16px; border-radius: 14px; border: 1.5px solid var(--border);
      background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px;
      resize: none; min-height: 44px; max-height: 120px; outline: none;
    }

    #send-btn {
      width: 44px; height: 44px; border-radius: 12px; border: none;
      background: var(--accent-ponnu); color: #fff; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
    }

    body.is-shundruu #send-btn { background: var(--accent-shundruu); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="brand">
      <span class="hearts">💬</span>
      <h1>Ponnu & Shundruu</h1>
      <p>Your private space</p>
    </div>
    <div class="user-options">
      <button class="user-btn ponnu" onclick="login('Ponnu')">
        <div class="avatar">P</div>
        <div class="info"><div class="name">Ponnu</div><div class="sub">That's me 👋</div></div>
      </button>
      <button class="user-btn shundruu" onclick="login('Shundruu')">
        <div class="avatar">S</div>
        <div class="info"><div class="name">Shundruu</div><div class="sub">That's me 👋</div></div>
      </button>
    </div>
  </div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-avatars"><div class="ha-1">P</div><div class="ha-2">S</div></div>
      <div class="header-info">
        <div class="title">Ponnu & Shundruu 💕</div>
        <div class="status"><div class="status-dot"></div><span>connected</span></div>
      </div>
    </div>
    <div class="header-right">
      <span class="you-badge" id="you-badge"></span>
      <button class="logout-btn" onclick="logout()">← Switch</button>
    </div>
  </div>
  <div id="messages">
    <div class="empty-state" id="empty-state">No messages yet 💌</div>
  </div>
  <div id="typing-indicator"></div>
  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, set } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── 1. Hardcoded Credentials
  const firebaseConfig = {
    apiKey: "AIzaSyA8OkY8Z2Vsie4tpNIp6TkiFIFE7b-Re-M",
    authDomain: "our-chat-4f679.firebaseapp.com",
    databaseURL: "https://our-chat-4f679-default-rtdb.firebaseio.com",
    projectId: "our-chat-4f679",
    storageBucket: "our-chat-4f679.firebasestorage.app",
    messagingSenderId: "23328498332",
    appId: "1:23328498332:web:4ffbd0f2e1557b39ec4359"
  };

  // ── 2. Initialization
  let db = null, currentUser = null, typingRef = null, typingTimer = null, lastDate = null;

  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    console.log("✅ Firebase Connected");
  } catch (e) { console.error("❌ Firebase Failed:", e); }

  // ── 3. Functions
  window.login = function(name) {
    currentUser = name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.body.classList.toggle('is-shundruu', name === 'Shundruu');
    const badge = document.getElementById('you-badge');
    badge.textContent = name;
    badge.className = 'you-badge ' + name.toLowerCase();
    listenMessages();
    listenTyping();
  };

  window.logout = function() { location.reload(); };

  window.sendMessage = function() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !db) return;
    push(ref(db, 'messages'), { sender: currentUser, text, ts: serverTimestamp() });
    input.value = '';
    input.style.height = 'auto';
    if (typingRef) set(typingRef, null);
  };

  function listenMessages() {
    onChildAdded(ref(db, 'messages'), (snap) => {
      const msg = snap.val();
      if (!msg) return;
      const container = document.getElementById('messages');
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      const date = msg.ts ? new Date(msg.ts).toLocaleDateString('en-IE', { weekday:'short', month:'short', day:'numeric' }) : 'Just now';
      if (date !== lastDate) {
        const div = document.createElement('div');
        div.className = 'date-divider'; div.textContent = date;
        container.appendChild(div); lastDate = date;
      }

      const isMine = msg.sender === currentUser;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
      const timeStr = msg.ts ? new Date(msg.ts).toLocaleTimeString('en-IE', { hour: '2-digit', minute: '2-digit' }) : '';

      row.innerHTML = `
        ${!isMine ? `<div class="msg-sender">${msg.sender}</div>` : ''}
        <div class="msg-bubble">${msg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
        <div class="msg-time">${timeStr}</div>
      `;
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    });
  }

  function listenTyping() {
    const other = currentUser === 'Ponnu' ? 'Shundruu' : 'Ponnu';
    typingRef = ref(db, `typing/${currentUser}`);
    onValue(ref(db, `typing/${other}`), (snap) => {
      document.getElementById('typing-indicator').textContent = snap.val() ? `${other} is typing...` : '';
    });
  }

  const msgInput = document.getElementById('msg-input');
  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    if (typingRef) {
      set(typingRef, true);
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => set(typingRef, null), 2000);
    }
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
  });
</script>
</body>
</html>
