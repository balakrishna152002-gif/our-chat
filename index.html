<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Ponnu & Shundruu 💬</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ponnu & Shundruu">
  
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #fff5f7; 
    --surface: rgba(255, 255, 255, 0.9);
    --border: #fce7f3;
    --text-primary: #4d2d35;
    --text-secondary: #94727a;
    --accent-ponnu: #60a5fa;    /* BK Blue */
    --accent-shundruu: #fb7185; /* Mathuu Pink */
  }

  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--bg); 
    background-image: radial-gradient(#fbcfe8 0.5px, transparent 0.5px);
    background-size: 20px 20px;
    display: flex; justify-content: center; align-items: center; 
    min-height: 100vh; color: var(--text-primary);
    overflow: hidden;
  }

  /* --- LOGIN SCREEN --- */
  #login-screen { width: 100%; max-width: 380px; padding: 20px; animation: fadeIn 0.8s ease; }
  .login-card { 
    background: white; border-radius: 30px; padding: 35px 30px; 
    box-shadow: 0 10px 25px rgba(244, 114, 182, 0.15); 
    border: 1px solid var(--border); text-align: center; 
  }
  .brand h1 { font-size: 22px; margin-bottom: 25px; color: var(--accent-shundruu); font-weight: 600; }
  
  .user-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  
  .user-btn { 
    display: flex; align-items: center; gap: 14px; padding: 18px; 
    border-radius: 20px; border: 2px solid white; background: #fafafa; 
    cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
  }
  .user-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); background: white; }
  .user-btn.ponnu:hover { border-color: var(--accent-ponnu); }
  .user-btn.shundruu:hover { border-color: var(--accent-shundruu); }

  .avatar { width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .ponnu .avatar { background: #eff6ff; border: 1px solid #dbeafe; }
  .shundruu .avatar { background: #fff1f2; border: 1px solid #ffe4e6; }
  
  .btn-label { display: flex; flex-direction: column; align-items: flex-start; }
  .btn-label .role { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
  .btn-label .name { font-size: 15px; font-weight: 600; }

  .anniversary-card {
    background: linear-gradient(135deg, #fff1f2, #fdf2f8);
    border-radius: 20px; padding: 20px; border: 1px dashed var(--accent-shundruu);
    display: flex; flex-direction: column; gap: 5px;
  }
  .anniversary-card .days { font-size: 28px; font-weight: 800; color: var(--accent-shundruu); }
  .anniversary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); font-weight: 600; }

  /* --- CHAT SCREEN --- */
  #chat-screen { 
    display: none; width: 100%; max-width: 480px; height: 92vh; 
    background: var(--surface); border-radius: 35px; flex-direction: column; 
    overflow: hidden; box-shadow: 0 20px 50px rgba(236, 72, 153, 0.1);
    border: 1px solid white; backdrop-filter: blur(10px);
  }

  .chat-header { 
    padding: 15px 25px; border-bottom: 1px solid var(--border); 
    display: flex; justify-content: space-between; align-items: center; 
    background: rgba(255, 255, 255, 0.4);
  }

  .header-info .title { font-weight: 600; color: var(--accent-shundruu); font-size: 17px; }
  .header-info .mini-timer { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

  .back-btn { 
    background: white; border: 1px solid var(--border); color: var(--accent-shundruu); 
    padding: 7px 12px; border-radius: 12px; font-size: 10px; font-weight: 700;
    cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px;
    text-transform: uppercase;
  }
  .back-btn:hover { background: var(--accent-shundruu); color: white; transform: translateX(-3px); }

  #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
  
  /* Message Bubbles */
  .msg-row { display: flex; flex-direction: column; max-width: 85%; animation: bubblePop 0.4s ease; position: relative; }
  .msg-row.mine { align-self: flex-end; align-items: flex-end; }
  .msg-row.theirs { align-self: flex-start; align-items: flex-start; }
  
  /* Reply Preview inside Bubble */
  .reply-inside {
    background: rgba(0,0,0,0.05); border-left: 3px solid rgba(0,0,0,0.2);
    padding: 5px 10px; border-radius: 10px; font-size: 11px; margin-bottom: 5px; opacity: 0.8;
  }

  .msg-bubble { 
    padding: 12px 18px; border-radius: 22px; font-size: 14.5px; line-height: 1.5; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.03); user-select: none;
  }
  
  .mine .msg-bubble { background: linear-gradient(135deg, var(--accent-ponnu), #3b82f6); color: white; border-bottom-right-radius: 4px; }
  body.is-shundruu .mine .msg-bubble { background: linear-gradient(135deg, var(--accent-shundruu), #f43f5e); }
  
  .theirs .msg-bubble { background: white; color: var(--text-primary); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg-time { font-size: 9px; color: var(--text-secondary); margin-top: 4px; padding: 0 5px; opacity: 0.8; }

  .msg-bubble.liked::after {
    content: '❤️'; position: absolute; bottom: -8px; right: -5px;
    font-size: 12px; background: white; border-radius: 50%; padding: 2px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* --- REPLY UI --- */
  #reply-preview {
    display: none; padding: 10px 20px; background: #fff; border-top: 1px solid var(--border);
    animation: slideUp 0.3s ease; align-items: center; justify-content: space-between;
  }
  .reply-box { border-left: 3px solid var(--accent-shundruu); padding-left: 10px; font-size: 12px; }
  .reply-box .reply-name { font-weight: bold; color: var(--accent-shundruu); }
  .cancel-reply { cursor: pointer; color: var(--text-secondary); font-size: 18px; padding: 0 10px; }

  .chat-input-area { padding: 10px 20px 25px; display: flex; gap: 10px; align-items: flex-end; }
  .input-wrapper { flex: 1; background: white; border-radius: 25px; padding: 5px 15px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
  #msg-input { flex: 1; border: none; outline: none; padding: 10px 0; background: transparent; font-size: 14px; width: 100%; resize: none; }
  
  #send-btn { 
    background: var(--accent-ponnu); color: white; border: none; width: 45px; height: 45px; 
    border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
  }
  body.is-shundruu #send-btn { background: var(--accent-shundruu); }

  @keyframes bubblePop { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="brand"><div style="font-size: 40px; margin-bottom: 10px;">👩‍❤️‍👨</div><h1>Our Private Space</h1></div>
    <div class="user-options">
      <button class="user-btn ponnu" onclick="login('Ponnu')">
        <div class="avatar">👦🏻</div>
        <div class="btn-label"><span class="role">BK</span><span class="name">I am Ponnu</span></div>
      </button>
      <button class="user-btn shundruu" onclick="login('Shundruu')">
        <div class="avatar">👧🏻</div>
        <div class="btn-label"><span class="role">Mathuu</span><span class="name">I am Shundruu</span></div>
      </button>
    </div>
    <div class="anniversary-card">
      <div class="label">Days Together</div>
      <div class="days" id="login-day-counter">0</div>
      <div style="font-size: 12px; opacity: 0.7;">& counting ❤️</div>
    </div>
  </div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div class="header-info">
      <div class="title">BK & Mathuu 💕</div>
      <div class="mini-timer">Day <span id="chat-day-counter">0</span> Together</div>
    </div>
    <button class="back-btn" onclick="location.reload()">Back</button>
  </div>
  
  <div id="messages"></div>

  <div id="reply-preview">
    <div class="reply-box">
      <div class="reply-name" id="reply-to-name">Reply to BK</div>
      <div id="reply-to-text" style="color: gray;">Message content...</div>
    </div>
    <div class="cancel-reply" onclick="cancelReply()">×</div>
  </div>

  <div id="typing-indicator"></div>
  
  <div class="chat-input-area">
    <div class="input-wrapper"><textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea></div>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, set, update } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA8OkY8Z2Vsie4tpNIp6TkiFIFE7b-Re-M",
    authDomain: "our-chat-4f679.firebaseapp.com",
    databaseURL: "https://our-chat-4f679-default-rtdb.firebaseio.com",
    projectId: "our-chat-4f679",
    storageBucket: "our-chat-4f679.firebasestorage.app",
    messagingSenderId: "23328498332",
    appId: "1:23328498332:web:4ffbd0f2e1557b39ec4359"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let currentUser = null, typingRef = null, replyingTo = null;

  function updateAnniversary(date) {
    const start = new Date(date);
    const now = new Date();
    const diff = Math.ceil(Math.abs(now - start) / (1000 * 60 * 60 * 24));
    document.getElementById('login-day-counter').textContent = diff;
    document.getElementById('chat-day-counter').textContent = diff;
  }

  window.login = function(name) {
    currentUser = name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.body.classList.toggle('is-shundruu', name === 'Shundruu');
    listenMessages();
    const other = (name === 'Ponnu') ? 'Shundruu' : 'Ponnu';
    typingRef = ref(db, `typing/${name}`);
    onValue(ref(db, `typing/${other}`), (snap) => {
      document.getElementById('typing-indicator').textContent = snap.val() ? `${other} is typing...` : '';
    });
  };

  window.cancelReply = function() {
    replyingTo = null;
    document.getElementById('reply-preview').style.display = 'none';
  };

  window.sendMessage = function() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    const msgData = { 
        sender: currentUser, 
        text, 
        ts: serverTimestamp(), 
        liked: false 
    };

    if (replyingTo) {
      msgData.replyTo = replyingTo;
      cancelReply();
    }

    push(ref(db, 'messages'), msgData);
    input.value = '';
    set(typingRef, null);
  };

  function listenMessages() {
    onChildAdded(ref(db, 'messages'), (snap) => {
      const msgId = snap.key;
      const msg = snap.val();
      const container = document.getElementById('messages');
      const isMine = msg.sender === currentUser;
      
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');

      let replyHtml = '';
      if (msg.replyTo) {
        replyHtml = `<div class="reply-inside"><b>${msg.replyTo.sender}:</b> ${msg.replyTo.text.substring(0,30)}...</div>`;
      }

      row.innerHTML = `
        <div class="msg-bubble ${msg.liked ? 'liked' : ''}" id="bubble-${msgId}">
          ${replyHtml}
          ${msg.text.replace(/</g,'&lt;')}
        </div>
        <div class="msg-time">${msg.ts ? new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ""}</div>
      `;
      
      const bubble = row.querySelector('.msg-bubble');
      
      // Single Click to Reply
      bubble.addEventListener('click', () => {
        replyingTo = { sender: msg.sender, text: msg.text };
        document.getElementById('reply-to-name').textContent = `Reply to ${msg.sender}`;
        document.getElementById('reply-to-text').textContent = msg.text;
        document.getElementById('reply-preview').style.display = 'flex';
        document.getElementById('msg-input').focus();
      });

      // Double Click to Like
      bubble.addEventListener('dblclick', (e) => {
        e.stopPropagation(); // Prevent trigger single click
        update(ref(db, `messages/${msgId}`), { liked: !msg.liked });
      });

      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    });

    onValue(ref(db, 'messages'), (snap) => {
      snap.forEach((childSnap) => {
        const el = document.getElementById(`bubble-${childSnap.key}`);
        if (el) childSnap.val().liked ? el.classList.add('liked') : el.classList.remove('liked');
      });
    });
  }

  const input = document.getElementById('msg-input');
  input.addEventListener('input', () => { if (typingRef) set(typingRef, true); });
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  updateAnniversary('2026-02-03');
</script>
</body>
</html>
